<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style.css">
    <title>ZEKI BOT - Giriş</title>
</head>
<body>
    <div class="login-screen">
        <div class="card">
            <h1 style="color:#7000ff; margin-bottom:30px">ZEKI CORE v3.0</h1>
            <p style="color:#888; margin-bottom:20px">Supabase ile kalıcı hafıza</p>
            <form action="/connect" method="POST">
                <input type="text" name="botname" placeholder="BOT İSMİ" required>
                <input type="text" name="host" placeholder="SUNUCU IP:PORT" required>
                <input type="text" name="version" placeholder="VERSION (1.20.1)" required>
                <button type="submit" style="width:100%">🚀 BAŞLAT</button>
            </form>
        </div>
    </div>
</body>
</html>
